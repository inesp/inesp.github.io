<svg viewBox="0 0 440 95" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- Mock() -->
  <rect x="10" y="10" width="120" height="50" rx="4" fill="#fff283" stroke="#e7d749" stroke-width="1.5"/>
  <text x="70" y="33" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">Mock()</text>
  <text x="70" y="49" text-anchor="middle" font-size="10" fill="#6c757d">The basic one</text>

  <!-- MagicMock() -->
  <rect x="160" y="10" width="120" height="50" rx="4" fill="#ffeaff" stroke="#da4ada" stroke-width="1.5"/>
  <text x="220" y="33" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">MagicMock()</text>
  <text x="220" y="49" text-anchor="middle" font-size="10" fill="#6c757d">+ magic methods</text>

  <!-- PropertyMock() -->
  <rect x="310" y="10" width="120" height="50" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="370" y="33" text-anchor="middle" font-size="12" font-weight="600" fill="#212529">PropertyMock()</text>
  <text x="370" y="49" text-anchor="middle" font-size="10" fill="#6c757d">For @property</text>

  <!-- Connecting line -->
  <path d="M 70 60 L 70 75 L 370 75 L 370 60" stroke="#6c757d" stroke-width="1" fill="none"/>
  <path d="M 220 60 L 220 75" stroke="#6c757d" stroke-width="1" fill="none"/>
  <circle cx="220" cy="75" r="2" fill="#6c757d"/>

  <text x="220" y="90" text-anchor="middle" font-size="9" fill="#6c757d">All return Mock objects</text>
</svg>
