<svg viewBox="0 -10 420 175" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fff"/>

  <text x="210" y="2" text-anchor="middle" font-size="10" fill="#9f9f9f" font-weight="normal">side_effect can be...</text>

  <!-- Iterator -->
  <text x="70" y="38" text-anchor="middle" font-size="10" fill="#da4ada" font-weight="bold">ITERATOR</text>
  <rect x="15" y="45" width="110" height="70" rx="4" fill="#ffeaff" stroke="#da4ada" stroke-width="1.5"/>
  <text x="70" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#212529">side_effect=[1,2,3]</text>
  <text x="70" y="85" text-anchor="middle" font-size="9" fill="#6c757d">Returns next value</text>
  <text x="70" y="98" text-anchor="middle" font-size="9" fill="#6c757d">on each call</text>

  <!-- Exception -->
  <text x="210" y="38" text-anchor="middle" font-size="10" fill="#fd456f" font-weight="bold">EXCEPTION</text>
  <rect x="150" y="45" width="120" height="70" rx="4" fill="#ffe6e6" stroke="#fd456f" stroke-width="1.5"/>
  <text x="210" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#212529">side_effect=Error</text>
  <text x="210" y="85" text-anchor="middle" font-size="9" fill="#6c757d">Raises exception</text>
  <text x="210" y="98" text-anchor="middle" font-size="9" fill="#6c757d">when called</text>

  <!-- Function -->
  <text x="350" y="38" text-anchor="middle" font-size="10" fill="#e6a000" font-weight="bold">FUNCTION</text>
  <rect x="290" y="45" width="120" height="70" rx="4" fill="#fdf3a0" stroke="#e6a000" stroke-width="1.5"/>
  <text x="350" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#212529">side_effect=fn</text>
  <text x="350" y="85" text-anchor="middle" font-size="9" fill="#6c757d">Calls your function</text>
  <text x="350" y="98" text-anchor="middle" font-size="9" fill="#6c757d">with same args</text>

  <!-- Examples below -->
  <text x="70" y="132" text-anchor="middle" font-size="9" fill="#6c757d">mock() → 1</text>
  <text x="70" y="145" text-anchor="middle" font-size="9" fill="#6c757d">mock() → 2</text>
  <text x="70" y="158" text-anchor="middle" font-size="9" fill="#6c757d">mock() → 3</text>

  <text x="210" y="140" text-anchor="middle" font-size="9" fill="#fd456f">mock() → raises!</text>

  <text x="350" y="132" text-anchor="middle" font-size="9" fill="#6c757d">mock(x, y)</text>
  <text x="350" y="145" text-anchor="middle" font-size="9" fill="#6c757d">↓</text>
  <text x="350" y="158" text-anchor="middle" font-size="9" fill="#6c757d">fn(x, y)</text>
</svg>
