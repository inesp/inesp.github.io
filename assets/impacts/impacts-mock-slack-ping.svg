<svg xmlns="http://www.w3.org/2000/svg" width="1152" height="692" viewBox="0 0 1152 692" font-family="Lato, system-ui, sans-serif">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="13" flood-color="#1f2933" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1152" height="692" fill="#ffffff"/>

  <!-- card -->
  <rect x="16" y="12" width="1120" height="648" rx="24" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- ============ message 1: degradation ============ -->
  <!-- avatar -->
  <rect x="72" y="56" width="44" height="44" rx="10" fill="#14a68c"/>
  <polyline points="80,78 90,78 95,68 101,88 106,78 108,78" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- name row -->
  <text x="132" y="74" font-size="16" font-weight="800" fill="#2b2f36">Health Watch</text>
  <rect x="248" y="60" width="42" height="18" rx="4" fill="#eef0f3"/>
  <text x="269" y="73" font-size="11" font-weight="700" fill="#8a919c" text-anchor="middle">APP</text>
  <text x="300" y="74" font-size="13" fill="#8a919c">today at 10:23</text>

  <!-- headline -->
  <text x="132" y="116" font-size="18" fill="#2b2f36">🚩 <tspan font-weight="800">Production went from healthy to unhealthy</tspan></text>

  <!-- metric rows -->
  <text x="132" y="157" font-size="16" font-weight="600" fill="#2b2f36">VM CPU utilization</text>
  <rect x="330" y="139" width="152" height="26" rx="13" fill="#fbe3ec"/>
  <text x="406" y="157" font-size="14" font-weight="700" fill="#b52560" text-anchor="middle">unhealthy · 74.2</text>
  <text x="496" y="157" font-size="14" font-weight="600" fill="#b52560">+38.1 above normal</text>

  <text x="132" y="195" font-size="16" font-weight="600" fill="#2b2f36">Queued jobs, 5 min</text>
  <rect x="330" y="177" width="116" height="26" rx="13" fill="#fdeeda"/>
  <text x="388" y="195" font-size="14" font-weight="700" fill="#a8621c" text-anchor="middle">ailing · 290</text>
  <text x="460" y="195" font-size="14" font-weight="600" fill="#a8621c">+230 above normal</text>

  <!-- context line -->
  <text x="132" y="233" font-size="15" fill="#5f6670">Degradation started 22 min after the latest deploy.</text>

  <!-- quote: latest deploy -->
  <rect x="132" y="252" width="4" height="60" rx="2" fill="#e3e6ea"/>
  <text x="152" y="272" font-size="11" font-weight="700" letter-spacing="1.5" fill="#8a919c">MOST RECENT DEPLOY</text>
  <text x="152" y="298" font-size="15" fill="#2b2f36"><tspan font-weight="700">APP-1187 · Fix repo sync for self-hosted Git</tspan><tspan fill="#8a919c"> — Maja K., 10:01</tspan></text>

  <!-- quote: last 36 h -->
  <rect x="132" y="326" width="4" height="60" rx="2" fill="#e3e6ea"/>
  <text x="152" y="346" font-size="11" font-weight="700" letter-spacing="1.5" fill="#8a919c">ALSO LIVE · DEPLOYED IN THE LAST 36 HOURS</text>
  <text x="152" y="372" font-size="15" fill="#2b2f36">5 more deploys — <tspan fill="#5f6670">APP-1183, APP-1180, APP-1176, APP-1174, APP-1172</tspan></text>

  <!-- buttons -->
  <g font-size="14" font-weight="700" fill="#2b2f36">
    <rect x="132" y="408" width="110" height="38" rx="8" fill="#ffffff" stroke="#d3d8de"/>
    <text x="187" y="432" text-anchor="middle">View health</text>
    <rect x="254" y="408" width="118" height="38" rx="8" fill="#ffffff" stroke="#d3d8de"/>
    <text x="313" y="432" text-anchor="middle">Acknowledge</text>
    <rect x="384" y="408" width="92" height="38" rx="8" fill="#ffffff" stroke="#d3d8de"/>
    <text x="430" y="432" text-anchor="middle">Mute 1 h</text>
  </g>

  <!-- ============ message 2: recovery ============ -->
  <rect x="72" y="492" width="44" height="44" rx="10" fill="#14a68c"/>
  <polyline points="80,514 90,514 95,504 101,524 106,514 108,514" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="132" y="510" font-size="16" font-weight="800" fill="#2b2f36">Health Watch</text>
  <rect x="248" y="496" width="42" height="18" rx="4" fill="#eef0f3"/>
  <text x="269" y="509" font-size="11" font-weight="700" fill="#8a919c" text-anchor="middle">APP</text>
  <text x="300" y="510" font-size="13" fill="#8a919c">today at 10:58</text>

  <text x="132" y="552" font-size="18" fill="#2b2f36">✅ <tspan font-weight="800">Production is back to healthy</tspan><tspan fill="#8a919c"> — degraded for 35 min</tspan></text>
  <text x="132" y="584" font-size="15" fill="#5f6670">All 24 metrics healthy again.</text>
</svg>
