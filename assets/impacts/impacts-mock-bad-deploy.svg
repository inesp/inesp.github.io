    <rect x="348" y="562" width="84" height="24" rx="12" fill="#dcf2ee"/>
    <text x="390" y="579" font-size="13" font-weight="700" fill="#0d7a67" text-anchor="middle">healthy</text>
    <text x="348" y="618" font-size="28" font-weight="800" fill="#2b2f36">ok</text>
    <text x="348" y="640" font-size="14" font-weight="600" fill="#8a919c">no change</text>
  </g>
  <g>
    <rect x="584" y="518" width="240" height="136" rx="16" fill="#ffffff" stroke="#eef0f3"/>
    <text x="604" y="548" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a919c">UPTIME PROBE</text>
    <rect x="604" y="562" width="84" height="24" rx="12" fill="#dcf2ee"/>
    <text x="646" y="579" font-size="13" font-weight="700" fill="#0d7a67" text-anchor="middle">healthy</text>
    <text x="604" y="618" font-size="28" font-weight="800" fill="#2b2f36">100<tspan font-size="15" font-weight="400" fill="#8a919c"> %</tspan></text>
    <text x="604" y="640" font-size="14" font-weight="600" fill="#8a919c">no change</text>
  </g>
  <g>
    <rect x="840" y="518" width="240" height="136" rx="16" fill="#ffffff" stroke="#eef0f3"/>
    <text x="860" y="548" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a919c">SYNTHETIC CHECKOUT</text>
    <rect x="860" y="562" width="84" height="24" rx="12" fill="#dcf2ee"/>
    <text x="902" y="579" font-size="13" font-weight="700" fill="#0d7a67" text-anchor="middle">healthy</text>
    <text x="860" y="618" font-size="28" font-weight="800" fill="#2b2f36">ok</text>
    <text x="860" y="640" font-size="14" font-weight="600" fill="#8a919c">no change</text>
