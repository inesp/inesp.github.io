    <rect x="348" y="406" width="96" height="24" rx="12" fill="#fbe3ec"/>
    <text x="396" y="423" font-size="13" font-weight="700" fill="#b52560" text-anchor="middle">unhealthy</text>
    <text x="348" y="462" font-size="28" font-weight="800" fill="#2b2f36">17.5<tspan font-size="15" font-weight="400" fill="#8a919c"> /min</tspan></text>
    <text x="348" y="484" font-size="14" font-weight="600" fill="#b52560">+17.5 above normal</text>
  </g>
  <g>
    <rect x="584" y="362" width="240" height="136" rx="16" fill="#ffffff" stroke="#eef0f3"/>
    <text x="604" y="392" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a919c">LB 5XX RESPONSES</text>
    <rect x="604" y="406" width="96" height="24" rx="12" fill="#fbe3ec"/>
    <text x="652" y="423" font-size="13" font-weight="700" fill="#b52560" text-anchor="middle">unhealthy</text>
    <text x="604" y="462" font-size="28" font-weight="800" fill="#2b2f36">22<tspan font-size="15" font-weight="400" fill="#8a919c"> /min</tspan></text>
    <text x="604" y="484" font-size="14" font-weight="600" fill="#b52560">+22 above normal</text>
  </g>
  <g>
    <rect x="840" y="362" width="240" height="136" rx="16" fill="#ffffff" stroke="#eef0f3"/>
    <text x="860" y="392" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a919c">QUEUED JOBS, 5 MIN</text>
    <rect x="860" y="406" width="68" height="24" rx="12" fill="#fdeeda"/>
    <text x="894" y="423" font-size="13" font-weight="700" fill="#a8621c" text-anchor="middle">ailing</text>
    <text x="860" y="462" font-size="28" font-weight="800" fill="#2b2f36">290</text>
    <text x="860" y="484" font-size="14" font-weight="600" fill="#a8621c">+230 above normal</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="72" y="518" width="240" height="136" rx="16" fill="#ffffff" stroke="#eef0f3"/>
    <text x="92" y="548" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a919c">POSTGRES CPU</text>
    <rect x="92" y="562" width="68" height="24" rx="12" fill="#fdeeda"/>
    <text x="126" y="579" font-size="13" font-weight="700" fill="#a8621c" text-anchor="middle">ailing</text>
    <text x="92" y="618" font-size="28" font-weight="800" fill="#2b2f36">71.0<tspan font-size="15" font-weight="400" fill="#8a919c"> %</tspan></text>
    <text x="92" y="640" font-size="14" font-weight="600" fill="#a8621c">+28.6 above normal</text>
  </g>
  <g>
    <rect x="328" y="518" width="240" height="136" rx="16" fill="#ffffff" stroke="#eef0f3"/>
