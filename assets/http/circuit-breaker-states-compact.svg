<svg viewBox="0 0 570 110" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- CLOSED -->
  <text x="85" y="40" text-anchor="middle" font-size="12" fill="#28a745" font-weight="bold">CLOSED</text>
  <rect x="20" y="45" width="130" height="55" fill="#d4edda" stroke="#28a745" stroke-width="1.5" rx="4"/>
  <text x="85" y="68" text-anchor="middle" font-size="18">:)</text>
  <text x="85" y="88" text-anchor="middle" font-size="10" fill="#212529">all good</text>

  <!-- HALF-OPEN -->
  <text x="255" y="40" text-anchor="middle" font-size="12" fill="#e6a000" font-weight="bold">HALF-OPEN</text>
  <rect x="170" y="45" width="170" height="55" fill="#fff283" stroke="#e7d749" stroke-width="1.5" rx="4"/>
  <text x="255" y="68" text-anchor="middle" font-size="18">:/</text>
  <text x="255" y="88" text-anchor="middle" font-size="10" fill="#212529">we let 1 request through</text>

  <!-- OPEN -->
  <text x="455" y="40" text-anchor="middle" font-size="12" fill="#fd456f" font-weight="bold">OPEN</text>
  <rect x="360" y="45" width="190" height="55" fill="#ffe6e6" stroke="#fd456f" stroke-width="1.5" rx="4"/>
  <text x="455" y="68" text-anchor="middle" font-size="18">:(</text>
  <text x="455" y="88" text-anchor="middle" font-size="10" fill="#212529">BLOCKED, no requests allowed</text>
</svg>
