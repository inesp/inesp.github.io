<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 330">
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- Title -->
  <text x="230" y="22" text-anchor="middle" font-weight="bold" font-size="12px" font-family="system-ui, -apple-system, sans-serif" fill="#212529">How many tests does login() need?</text>

  <!-- Level 1: What we write -->
  <rect x="30" y="42" width="400" height="48" rx="6" fill="#e0f2e7" stroke="#4a9c6d" stroke-width="1.5"/>
  <text x="45" y="62" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#316849" font-weight="bold">What we write:</text>
  <text x="45" y="80" font-size="10px" font-family="monospace" fill="#4a9c6d">login("alice", "correct_pass") → success</text>
  <text x="380" y="70" text-anchor="middle" font-size="18px" fill="#4a9c6d" font-weight="bold">1</text>

  <!-- Arrow + "but actually" -->
  <text x="230" y="105" text-anchor="middle" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d" font-style="italic">but actually...</text>

  <!-- Level 2: Need negative test -->
  <rect x="30" y="115" width="400" height="48" rx="6" fill="#fff8cd" stroke="#e6a000" stroke-width="1.5"/>
  <text x="45" y="135" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#e6a000" font-weight="bold">We also need a negative test:</text>
  <text x="45" y="153" font-size="10px" font-family="monospace" fill="#e6a000">login("alice", "wrong_pass") → failure</text>
  <text x="380" y="143" text-anchor="middle" font-size="18px" fill="#e6a000" font-weight="bold">2</text>

  <!-- Arrow + "but actually" -->
  <text x="230" y="178" text-anchor="middle" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d" font-style="italic">but actually...</text>

  <!-- Level 3: Need second user -->
  <rect x="30" y="188" width="400" height="58" rx="6" fill="#ffe6e6" stroke="#ff7898" stroke-width="1.5"/>
  <text x="45" y="208" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#e60038" font-weight="bold">We need a second user (alice can't become bob):</text>
  <text x="45" y="226" font-size="10px" font-family="monospace" fill="#ff7898">login("bob", "bob_pass") → success, as bob</text>
  <text x="45" y="240" font-size="10px" font-family="monospace" fill="#ff7898">login("alice", "bob_pass") → failure</text>
  <text x="380" y="220" text-anchor="middle" font-size="18px" fill="#e60038" font-weight="bold">4</text>

  <!-- Arrow + "but actually" -->
  <text x="230" y="261" text-anchor="middle" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d" font-style="italic">but actually...</text>

  <!-- Level 4: And more -->
  <rect x="30" y="271" width="400" height="48" rx="6" fill="#fff" stroke="#da4ada" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="230" y="300" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#da4ada" font-weight="bold">empty password? locked account? rate limiting? SQL injection? ...</text>
</svg>
