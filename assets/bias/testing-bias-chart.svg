<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- Title -->
  <text x="240" y="24" text-anchor="middle" font-weight="bold" font-size="12px" font-family="system-ui, -apple-system, sans-serif" fill="#212529">Confirmatory vs Disconfirmatory Tests</text>

  <!-- Y-axis -->
  <line x1="80" y1="50" x2="80" y2="220" stroke="#dadada" stroke-width="1"/>
  <text x="40" y="140" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d" transform="rotate(-90, 40, 140)">Num of tests</text>

  <!-- Y-axis labels -->
  <text x="72" y="220" text-anchor="end" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d">0</text>
  <text x="72" y="178" text-anchor="end" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d">50</text>
  <text x="72" y="135" text-anchor="end" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d">100</text>
  <text x="72" y="93" text-anchor="end" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d">150</text>
  <text x="72" y="50" text-anchor="end" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d">200</text>

  <!-- Grid lines -->
  <line x1="80" y1="178" x2="400" y2="178" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="135" x2="400" y2="135" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="93" x2="400" y2="93" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="50" x2="400" y2="50" stroke="#f0f0f0" stroke-width="1"/>

  <!-- X-axis -->
  <line x1="80" y1="220" x2="400" y2="220" stroke="#dadada" stroke-width="1"/>

  <!-- Bar 1: Time Pressure (150 confirmatory + 24 disconfirmatory = 174 total) -->
  <!-- Scale: 200 tests = 170px height, so 1 test = 0.85px -->
  <!-- 150 = 127.5px, 24 = 20.4px -->
  <rect x="120" y="92" width="80" height="128" rx="2" fill="#06bdad"/>
  <rect x="120" y="72" width="80" height="20" rx="2" fill="#ffcf65"/>
  <text x="160" y="160" text-anchor="middle" font-size="11px" font-family="system-ui, -apple-system, sans-serif" fill="#fff" font-weight="bold">150</text>
  <text x="160" y="85" text-anchor="middle" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#fff" font-weight="bold">24</text>

  <!-- Bar 2: No Time Pressure (171 confirmatory + 26 disconfirmatory = 197 total) -->
  <!-- 171 = 145.35px, 26 = 22.1px -->
  <rect x="280" y="75" width="80" height="145" rx="2" fill="#06bdad"/>
  <rect x="280" y="53" width="80" height="22" rx="2" fill="#ffcf65"/>
  <text x="320" y="155" text-anchor="middle" font-size="11px" font-family="system-ui, -apple-system, sans-serif" fill="#fff" font-weight="bold">171</text>
  <text x="320" y="68" text-anchor="middle" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#fff" font-weight="bold">26</text>

  <!-- X-axis labels -->
  <text x="160" y="238" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#495057">Time Pressure</text>
  <text x="320" y="238" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#495057">No Time Pressure</text>

  <!-- Legend -->
  <rect x="140" y="255" width="12" height="12" rx="2" fill="#ffcf65"/>
  <text x="158" y="265" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#495057">Disconfirmatory tests</text>
  <rect x="280" y="255" width="12" height="12" rx="2" fill="#06bdad"/>
  <text x="298" y="265" font-size="9px" font-family="system-ui, -apple-system, sans-serif" fill="#495057">Confirmatory tests</text>
</svg>
