<svg viewBox="0 0 550 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- Title -->
  <text x="200" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#212529" text-anchor="middle">Success Rate: Sample Query vs Starting Fresh</text>

  <!-- Bar 1: With sample query (21.5%) -->
  <text x="30" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#212529">With sample query</text>
  <rect x="150" y="55" width="86" height="30" rx="4" fill="#fd456f"/>
  <text x="246" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ff0040">21.5%</text>

  <!-- Bar 2: Without sample query (44.3%) -->
  <text x="30" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#212529">Starting fresh</text>
  <rect x="150" y="105" width="177" height="30" rx="4" fill="#28a745"/>
  <text x="337" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4a9c6d">44.3%</text>

  <!-- Scale reference line at 50% -->
  <line x1="350" y1="50" x2="350" y2="145" stroke="#dadada" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="350" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9f9f9f" text-anchor="middle">50%</text>

  <!-- Insight box -->
  <rect x="30" y="170" width="340" height="24" rx="4" fill="#fff8cd" stroke="#e7d749" stroke-width="1"/>
  <text x="200" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5c5200" text-anchor="middle">The "helpful" starting point cut success rate in HALF</text>
</svg>
