<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200">
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- Title -->
  <text x="230" y="20" text-anchor="middle" font-weight="bold" font-size="11px" font-family="system-ui, -apple-syfstem, sans-serif" fill="#212529">Why isn't it perfect after the first try?</text>

  <!-- Row 1 -->
  <!-- Blob 1: Good coffee -->
  <ellipse cx="90" cy="60" rx="55" ry="24" fill="#e0f2e7" stroke="#4a9c6d" stroke-width="1.5"/>
  <text x="90" y="64" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#316849" font-weight="bold">good coffee</text>

  <!-- Arrow 1→2 -->
  <line x1="153" y1="60" x2="180" y2="60" stroke="#dadada" stroke-width="2"/>
  <polygon points="187,60 180,55 180,65" fill="#dadada"/>

  <!-- Blob 2: Quiet -->
  <ellipse cx="230" cy="60" rx="35" ry="24" fill="#fff8cd" stroke="#e6a000" stroke-width="1.5"/>
  <text x="230" y="64" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#e6a000" font-weight="bold">+ quiet</text>

  <!-- Arrow 2→3 -->
  <line x1="270" y1="60" x2="305" y2="60" stroke="#dadada" stroke-width="2"/>
  <polygon points="312,60 305,55 305,65" fill="#dadada"/>

  <!-- Blob 3: Easy to clean -->
  <ellipse cx="370" cy="60" rx="55" ry="24" fill="#e1f5fe" stroke="#0288d1" stroke-width="1.5"/>
  <text x="370" y="64" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#0288d1" font-weight="bold">+ easy to clean</text>

  <!-- Arrow down and left (wrap to row 2) -->
  <path d="M 370 87 L 370 105 Q 370 115 360 115 L 100 115 Q 90 115 90 125 L 90 130" stroke="#dadada" stroke-width="2" fill="none"/>
  <polygon points="90,137 85,130 95,130" fill="#dadada"/>

  <!-- Row 2 -->
  <!-- Blob 4: Big dispenser -->
  <ellipse cx="90" cy="160" rx="55" ry="24" fill="#ffeaff" stroke="#da4ada" stroke-width="1.5"/>
  <text x="90" y="164" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#da4ada" font-weight="bold">+ big dispenser</text>

  <!-- Arrow 4→5 -->
  <line x1="153" y1="160" x2="180" y2="160" stroke="#dadada" stroke-width="2"/>
  <polygon points="187,160 180,155 180,165" fill="#dadada"/>

  <!-- Blob 5: ... -->
  <ellipse cx="230" cy="160" rx="35" ry="24" fill="#fff" stroke="#dadada" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="230" y="164" text-anchor="middle" font-size="14px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d" font-weight="bold">...</text>

  <!-- Arrow 5→6 -->
  <line x1="270" y1="160" x2="305" y2="160" stroke="#dadada" stroke-width="2"/>
  <polygon points="312,160 305,155 305,165" fill="#dadada"/>

  <!-- Blob 6: perfection? -->
  <ellipse cx="370" cy="160" rx="55" ry="24" fill="#fff" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="370" y="164" text-anchor="middle" font-size="10px" font-family="system-ui, -apple-system, sans-serif" fill="#6c757d" font-style="italic">perfection?</text>
</svg>
