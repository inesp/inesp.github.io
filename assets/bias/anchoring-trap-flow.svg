<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fff"/>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#9f9f9f"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#fd456f"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#4a9c6d"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="260" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#212529" text-anchor="middle">The Anchoring Trap</text>

  <!-- Step 1: Boss offers query -->
  <rect x="30" y="50" width="130" height="50" rx="6" fill="#ffeaff" stroke="#da4ada" stroke-width="1.5"/>
  <text x="95" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">Boss offers</text>
  <text x="95" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">"helpful" old query</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="75" x2="195" y2="75" stroke="#9f9f9f" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Step 2: Developer accepts -->
  <rect x="200" y="50" width="120" height="50" rx="6" fill="#e0f2e7" stroke="#4a9c6d" stroke-width="1.5"/>
  <text x="260" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">You accept it</text>
  <text x="260" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">"this will save time!"</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="75" x2="355" y2="75" stroke="#9f9f9f" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Step 3: Quick glance -->
  <rect x="360" y="50" width="130" height="50" rx="6" fill="#fff8cd" stroke="#e7d749" stroke-width="1.5"/>
  <text x="425" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">Quick glance</text>
  <text x="425" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">"seems similar enough"</text>

  <!-- Arrow down from quick glance -->
  <line x1="425" y1="100" x2="425" y2="135" stroke="#9f9f9f" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Decision diamond: Go deeper? -->
  <polygon points="425,140 490,175 425,210 360,175" fill="#fff" stroke="#6c757d" stroke-width="1.5"/>
  <text x="425" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#212529" text-anchor="middle">Go deeper?</text>
  <text x="425" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">check edge cases?</text>

  <!-- "No" path (the trap) -->
  <text x="345" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fd456f">No</text>
  <line x1="360" y1="175" x2="290" y2="175" stroke="#fd456f" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- "Looks fine!" -->
  <rect x="160" y="150" width="125" height="50" rx="6" fill="#ffe6e6" stroke="#fd456f" stroke-width="1.5"/>
  <text x="222" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" font-style="italic" fill="#ff0040" text-anchor="middle">"Looks fine!"</text>
  <text x="222" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">ship it</text>

  <!-- Arrow to bugs -->
  <line x1="160" y1="175" x2="115" y2="175" stroke="#fd456f" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Bugs! -->
  <rect x="30" y="150" width="80" height="50" rx="6" fill="#ff0040" stroke="#e60038" stroke-width="1.5"/>
  <text x="70" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Bugs</text>

  <!-- "Yes" path (rare) -->
  <text x="495" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#4a9c6d">Yes</text>
  <path d="M 490 175 Q 520 175 520 220 Q 520 265 360 265" fill="none" stroke="#4a9c6d" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Deep understanding -->
  <rect x="200" y="240" width="155" height="50" rx="6" fill="#e0f2e7" stroke="#4a9c6d" stroke-width="1.5"/>
  <text x="277" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">Actually understand</text>
  <text x="277" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">both problem spaces</text>

  <!-- Arrow to correct code -->
  <line x1="200" y1="265" x2="115" y2="265" stroke="#4a9c6d" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Correct code -->
  <rect x="30" y="240" width="80" height="50" rx="6" fill="#28a745" stroke="#4a9c6d" stroke-width="1.5"/>
  <text x="70" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Correct</text>
  <text x="70" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">code</text>

  <!-- Annotation: what we usually do -->
  <text x="145" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fd456f" text-anchor="middle">← what we usually do</text>
</svg>
