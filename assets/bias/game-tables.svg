  <text x="155" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">Carol</text>

  <text x="110" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9f9f9f" text-anchor="middle">...</text>

