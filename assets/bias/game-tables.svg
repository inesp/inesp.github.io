<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fff"/>

  <!-- Table 1: users -->
  <text x="110" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#da4ada" text-anchor="middle">users</text>

