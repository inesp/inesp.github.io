  <text x="430" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">850</text>

  <rect x="280" y="87" width="180" height="24" fill="#fff" stroke="#dadada" stroke-width="1"/>
  <text x="310" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">2</text>
  <line x1="340" y1="87" x2="340" y2="111" stroke="#dadada" stroke-width="1"/>
  <text x="370" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">2</text>
