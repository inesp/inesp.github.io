  <text x="430" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">720</text>

  <rect x="280" y="111" width="180" height="24" fill="#fff" stroke="#dadada" stroke-width="1"/>
  <text x="310" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">3</text>
  <line x1="340" y1="111" x2="340" y2="135" stroke="#dadada" stroke-width="1"/>
  <text x="370" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">1</text>
  <line x1="400" y1="111" x2="400" y2="135" stroke="#dadada" stroke-width="1"/>
  <text x="430" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">920</text>

  <rect x="280" y="135" width="180" height="24" fill="#fff" stroke="#dadada" stroke-width="1"/>
  <text x="310" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">4</text>
  <line x1="340" y1="135" x2="340" y2="159" stroke="#dadada" stroke-width="1"/>
  <text x="370" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">3</text>
  <line x1="400" y1="135" x2="400" y2="159" stroke="#dadada" stroke-width="1"/>
  <text x="430" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#495057" text-anchor="middle">680</text>

  <text x="370" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9f9f9f" text-anchor="middle">...</text>

  <!-- Join arrow -->
  <defs>
    <marker id="arrowJoin" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#6c757d"/>
    </marker>
  </defs>
  <path d="M 200 85 Q 240 85 240 75 Q 240 65 280 65" fill="none" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowJoin)"/>
  <text x="240" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">JOIN</text>

  <!-- Task description -->
  <rect x="60" y="185" width="360" height="28" rx="4" fill="#fff8cd" stroke="#e7d749" stroke-width="1"/>
  <text x="240" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5c5200" text-anchor="middle">Task: Get top 100 players by their BEST score (no duplicates)</text>
</svg>
