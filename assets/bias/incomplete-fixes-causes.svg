<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect width="100%" height="100%" fill="#fff"/>

  <style>
    .title { font: bold 14px system-ui, -apple-system, sans-serif; fill: #212529; }
    .label { font: 11px system-ui, -apple-system, sans-serif; fill: #495057; }
    .count { font: bold 12px system-ui, -apple-system, sans-serif; fill: #fff; }
    .count-dark { font: bold 12px system-ui, -apple-system, sans-serif; fill: #495057; }
    .subtitle { font: 10px system-ui, -apple-system, sans-serif; fill: #6c757d; }
  </style>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" class="title">Why do bug fixes need a second attempt?</text>
  <text x="260" y="40" text-anchor="middle" class="subtitle">(100 incomplete patches manually inspected)</text>

  <!-- Bars -->
  <!-- 28: Missed porting -->
  <text x="200" y="72" text-anchor="end" class="label">Missed porting to branch/component</text>
  <rect x="210" y="58" width="280" height="22" rx="4" fill="#dc3545"/>
  <text x="220" y="73" class="count">28</text>

  <!-- 23: Conditional statements -->
  <text x="200" y="102" text-anchor="end" class="label">Incorrect conditional handling</text>
  <rect x="210" y="88" width="230" height="22" rx="4" fill="#e85d6c"/>
  <text x="220" y="103" class="count">23</text>

  <!-- 15: Referencing code -->
  <text x="200" y="132" text-anchor="end" class="label">Forgot to update referencing code</text>
  <rect x="210" y="118" width="150" height="22" rx="4" fill="#fd7e14"/>
  <text x="220" y="133" class="count">15</text>

  <!-- 7: Patch reverted -->
  <text x="200" y="162" text-anchor="end" class="label">Initial patch had to be reverted</text>
  <rect x="210" y="148" width="70" height="22" rx="4" fill="#ffc107"/>
  <text x="220" y="163" class="count-dark">7</text>

  <!-- 7: Refactored during fix -->
  <text x="200" y="192" text-anchor="end" class="label">Patch refactored in supplementary fix</text>
  <rect x="210" y="178" width="70" height="22" rx="4" fill="#20c997"/>
  <text x="220" y="193" class="count">7</text>

  <!-- 5: Comments -->
  <text x="200" y="222" text-anchor="end" class="label">Comment improvements needed</text>
  <rect x="210" y="208" width="50" height="22" rx="4" fill="#17a2b8"/>
  <text x="220" y="223" class="count">5</text>

  <!-- 4: Subclasses -->
  <text x="200" y="252" text-anchor="end" class="label">Sibling subclasses not updated</text>
  <rect x="210" y="238" width="40" height="22" rx="4" fill="#6f42c1"/>
  <text x="220" y="253" class="count">4</text>

  <!-- 3: Incomplete refactoring -->
  <text x="200" y="282" text-anchor="end" class="label">Incomplete refactoring</text>
  <rect x="210" y="268" width="30" height="22" rx="4" fill="#6c757d"/>
  <text x="220" y="283" class="count">3</text>

  <!-- 8: Other (2 + 6) -->
  <text x="200" y="312" text-anchor="end" class="label">Other (null checks, cleanup, etc.)</text>
  <rect x="210" y="298" width="80" height="22" rx="4" fill="#adb5bd"/>
  <text x="220" y="313" class="count-dark">8</text>

</svg>
