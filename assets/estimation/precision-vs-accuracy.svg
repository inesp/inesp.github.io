<svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="400" height="140" fill="#fff"/>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#212529" font-weight="bold">Better to be precise than accurate</text>

  <!-- Time axis (green line) -->
  <line x1="30" y1="70" x2="370" y2="70" stroke="#28a745" stroke-width="3"/>

  <!-- The actual outcome point on the time axis -->
  <circle cx="260" cy="70" r="4" fill="#ffed50" stroke="#e7d749" stroke-width="1.5"/>

  <!-- Dev 1: narrow range (above the line) -->
  <text x="230" y="38" text-anchor="middle" font-size="10" fill="#4a5568" font-weight="bold">Dev 1</text>
  <line x1="200" y1="55" x2="260" y2="55" stroke="#4a5568" stroke-width="2"/>
  <!-- Diamond endpoints: center at (200,55) and (260,55), size 6 -->
  <polygon points="200,49 206,55 200,61 194,55" fill="#4a5568"/>
  <polygon points="260,49 266,55 260,61 254,55" fill="#4a5568"/>

  <!-- Dotted line from Dev 1 down to actual point -->
  <line x1="230" y1="55" x2="230" y2="70" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Dev 2: wide range (below the line) -->
  <text x="230" y="115" text-anchor="middle" font-size="10" fill="#4a5568" font-weight="bold">Dev 2</text>
  <line x1="120" y1="90" x2="320" y2="90" stroke="#4a5568" stroke-width="2"/>
  <!-- Diamond endpoints: center at (120,90) and (320,90), size 6 -->
  <polygon points="120,84 126,90 120,96 114,90" fill="#4a5568"/>
  <polygon points="320,84 326,90 320,96 314,90" fill="#4a5568"/>

  <!-- Dotted line from actual point down to Dev 2 -->
  <line x1="230" y1="70" x2="230" y2="90" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- time label -->
  <text x="55" y="65" font-size="9" fill="#28a745">time</text>

  <!-- Subtitle -->
  <text x="200" y="132" text-anchor="middle" font-size="9" fill="#6c757d" font-style="italic">35 out of 37 managers preferred Dev 1's estimates</text>
</svg>
