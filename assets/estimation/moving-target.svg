<svg viewBox="60 0 360 160" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="420" height="160" fill="#fff"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow-left" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="6,0 0,3 6,6" fill="#28a745"/>
    </marker>
    <marker id="arrow-right" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#fd456f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="240" y="18" text-anchor="middle" font-size="11" fill="#212529" font-weight="bold">The Moving Target</text>

  <!-- Left side: FASTER -->
  <text x="110" y="45" text-anchor="middle" font-size="10" fill="#28a745" font-weight="bold">FASTER</text>

  <!-- Right side: SLOWER -->
  <text x="370" y="45" text-anchor="middle" font-size="10" fill="#fd456f" font-weight="bold">SLOWER</text>

  <!-- Central rope -->
  <line x1="150" y1="90" x2="330" y2="90" stroke="#6c757d" stroke-width="3" stroke-linecap="round"/>

  <!-- You marker -->
  <circle cx="240" cy="90" r="14" fill="#da4ada" stroke="#b030b0" stroke-width="1.5"/>
  <text x="240" y="93" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">You</text>

  <!-- Left pulling arrow -->
  <line x1="200" y1="90" x2="150" y2="90" stroke="#28a745" stroke-width="2.5" marker-start="url(#arrow-left)"/>

  <!-- Right pulling arrow -->
  <line x1="340" y1="90" x2="280" y2="90" stroke="#fd456f" stroke-width="2.5" marker-end="url(#arrow-right)"/>

  <!-- Left factors -->
  <rect x="70" y="55" width="80" height="20" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="110" y="69" text-anchor="middle" font-size="10" fill="#212529">Practice</text>

  <rect x="70" y="80" width="80" height="20" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="110" y="94" text-anchor="middle" font-size="10" fill="#212529">Familiarity</text>

  <rect x="70" y="105" width="80" height="20" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="110" y="119" text-anchor="middle" font-size="10" fill="#212529">Efficiency</text>

  <!-- Right factors -->
  <rect x="330" y="55" width="80" height="20" rx="3" fill="#ffe6e6" stroke="#fd456f" stroke-width="1"/>
  <text x="370" y="69" text-anchor="middle" font-size="10" fill="#212529">New tools</text>

  <rect x="330" y="80" width="80" height="20" rx="3" fill="#ffe6e6" stroke="#fd456f" stroke-width="1"/>
  <text x="370" y="94" text-anchor="middle" font-size="10" fill="#212529">Team changes</text>

  <rect x="330" y="105" width="80" height="20" rx="3" fill="#ffe6e6" stroke="#fd456f" stroke-width="1"/>
  <text x="370" y="119" text-anchor="middle" font-size="10" fill="#212529">New reqs</text>

  <!-- Subtitle -->
  <text x="240" y="150" text-anchor="middle" font-size="9" fill="#6c757d" font-style="italic">We try to stabilize the world, but the world changes under our feet</text>
</svg>
