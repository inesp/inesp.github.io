  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#dab930">
  <meta name="msapplication-TileColor" content="#ffde59">
  <meta name="theme-color" content="#ffde59">

  <title>{%- if page.title -%}
      {{ page.title }}{%- if page.series -%}{%- assign head_coll = site.data.topics[page.series] -%} (Collection: {{ head_coll.display_title | default: page.series }}){%- endif -%}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}&nbsp;by {{ site.author }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}

  <link rel="stylesheet" href="{{ "/assets/bs-override.css" | relative_url }}?v={{ site.time | date: '%s' }}">

  <!-- Prism.js syntax highlighting -->
  <link href="https://cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-dracula.min.css" rel="stylesheet" />

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>

  {% feed_meta %}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
